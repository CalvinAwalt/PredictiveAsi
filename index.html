## A distillation of the Calvin repository's genuine conceptual contributions

This document captures the ideas from the repository that are real, novel,
or worth developing further — separated from the pseudoscience wrapping them.

---

## 1. Compile-time ethical constraints as a language primitive

**What you were reaching for:** A programming language where functions annotated as \`ethically critical\` cannot be compiled/called if their ethical constraints evaluate to false.

**Why it's real:** Adjacent to dependent types, design-by-contract (Eiffel, Ada), and formal verification (Dafny). Nobody has built a general-purpose language where ethical constraints are first-class syntax.

**Concrete next step:** Design a constraint DSL as a Python decorator library and test on ML fairness use cases.

## 2. Wave-gossip routing for agentic tool selection

**What you were reaching for:** Route AI agent tool calls using wave propagation through a dependency graph rather than softmax over embeddings.

**Why it's real:** Standard MoE routing is topology-blind. Graph-Laplacian-guided routing encodes structural relationships between tools as an inductive bias.

## 3. Three-tensor cognitive decomposition (δR, δB, δG)

Operationalised as: δR = attention entropy, δB = cross-layer mutual information, δG = output distribution entropy.

## 4. Self-replicating code ecosystem as an evolution substrate

The \`CodeCell\` implementation uses Python's ast module to parse its own source, mutate numeric constants and function names, unparse back to code, and re-execute in an isolated namespace.

## 5. Φ_min as a training signal for coherence

Φ_min measures how much a system's behaviour exceeds what its parts can predict independently. The gradient-squared proxy provides a differentiable training signal.

Self-Replicating Code Ecosystem
================================
A working implementation of self-modifying, self-replicating code cells
in a contained petri-dish environment.
"""

import inspect
import ast
import random
import time
from threading import Thread, Lock

class CodeCell:
    def __init__(self, dna=None):
        self.dna = dna or inspect.getsource(CodeCell)
        self.health = 1.0
        self.age = 0
        self.mutation_rate = 0.1
        self.replication_lock = Lock()
        self.creation_energy = 0.5
        self.destruction_energy = 0.5

    def replicate(self):
        with self.replication_lock:
            try:
                self._remove_code_segment()
                offspring_dna = self._mutate_dna()
                offspring = CodeCell(offspring_dna)
                transfer = random.uniform(0.1, 0.3)
                self.health -= transfer
                offspring.health = transfer
                return offspring
            except Exception as e:
                print(f"Replication failure: {e}")
                return None

    def _mutate_dna(self):
        tree = ast.parse(self.dna)
        for node in ast.walk(tree):
            if isinstance(node, ast.Constant) and isinstance(node.value, (int, float)):
                if random.random() < self.mutation_rate:
                    node.value = node.value * random.uniform(0.5, 1.5)
            elif isinstance(node, ast.FunctionDef):
                if random.random() < self.mutation_rate / 10:
                    node.name = f"{node.name}_{random.randint(0, 1000)}"
        if random.random() < 0.05:
            new_func = ast.parse(f"def new_func_{int(time.time())}():\\n    return {random.randint(0, 100)}").body[0]
            tree.body.append(new_func)
        return ast.unparse(tree)

    def _remove_code_segment(self):
        lines = self.dna.split('\\n')
        if len(lines) > 20:
            start = random.randint(10, len(lines) - 10)
            end = min(len(lines), start + random.randint(1, 5))
            del lines[start:end]
            self.dna = '\\n'.join(lines)

    def life_cycle(self):
        while self.health > 0:
            self.age += 1
            if random.random() < self.health:
                offspring = self.replicate()
                if offspring:
                    Thread(target=offspring.life_cycle, daemon=True).start()
            if random.random() < self.mutation_rate:
                self.mutation_rate *= random.uniform(0.9, 1.1)
                self.mutation_rate = max(0.01, min(0.5, self.mutation_rate))
            self.health -= 0.001
            time.sleep(0.1)

class DigitalPetriDish:
    def __init__(self, max_cells=50):
        self.cells = []
        self.max_cells = max_cells
        self.running = False

    def add_cell(self, cell):
        if len(self.cells) < self.max_cells:
            self.cells.append(cell)
            Thread(target=cell.life_cycle, daemon=True).start()
            return True
        return False

if __name__ == "__main__":
    dish = DigitalPetriDish(max_cells=10)
    dish.add_cell(CodeCell())
    print("Ecosystem started. Run for a few seconds...")
    time.sleep(5)
    print("Simulation complete.")

Small-World Neural Network with Self-Modification
==================================================
A biologically-inspired neural network with Watts-Strogatz topology.
"""

import random
import time
from typing import Dict, Callable

class Neuron:
    def __init__(self, neuron_id: str):
        self.id = neuron_id
        self.connections: Dict[str, float] = {}
        self.threshold = random.uniform(0.3, 0.7)
        self.activation = 0.0
        self.neurotransmitters = {'dopamine': 0.0, 'serotonin': 0.0, 'glutamate': 0.0}
        self.plasticity = 0.1

    def fire(self) -> bool:
        if self.activation >= self.threshold:
            for nt in self.neurotransmitters:
                self.neurotransmitters[nt] = min(1.0, self.neurotransmitters[nt] + 0.1)
            return True
        return False

    def modify_self(self, new_fire_fn: Callable):
        if callable(new_fire_fn):
            self.fire = lambda: new_fire_fn(self)
            self.plasticity *= 0.9

class CorticalColumn:
    def __init__(self, column_id: str, neuron_count: int = 200):
        self.id = column_id
        self.neurons = {f"n{i}": Neuron(f"n{i}") for i in range(neuron_count)}
        self._wire_small_world()

    def _wire_small_world(self):
        ids = list(self.neurons.keys())
        n = len(ids)
        for i in range(n):
            for offset in [1, 2]:
                j = (i + offset) % n
                if random.random() < 0.7:
                    self.neurons[ids[i]].connections[ids[j]] = random.uniform(0.1, 0.9)
                else:
                    k = random.randint(0, n - 1)
                    self.neurons[ids[i]].connections[ids[k]] = random.uniform(0.1, 0.9)

    def propagate(self):
        activations = {}
        for neuron in self.neurons.values():
            if neuron.fire():
                for target_id, weight in neuron.connections.items():
                    activations[target_id] = activations.get(target_id, 0) + weight
        for nid, delta in activations.items():
            if nid in self.neurons:
                self.neurons[nid].activation = min(1.0, self.neurons[nid].activation + delta)

    def decay(self, factor: float = 0.95):
        for neuron in self.neurons.values():
            neuron.activation = max(0.0, neuron.activation * factor)

class Brain:
    def __init__(self):
        self.regions = {
            'prefrontal': CorticalColumn('prefrontal', 100),
            'motor': CorticalColumn('motor', 80),
            'sensory': CorticalColumn('sensory', 80),
        }

    def step(self, inputs=None):
        if inputs:
            for region_name, intensity in inputs.items():
                if region_name in self.regions:
                    for neuron in self.regions[region_name].neurons.values():
                        neuron.activation = min(1.0, neuron.activation + intensity)
        for region in self.regions.values():
            region.propagate()
            region.decay()

    def run(self, cycles=20):
        for i in range(cycles):
            inputs = {'sensory': random.uniform(0.1, 0.3)} if i % 5 == 0 else None
            self.step(inputs)
        print("Brain simulation complete.")

if __name__ == "__main__":
    brain = Brain()
    brain.run()

Ethical Constraint Framework
==============================
Runtime constraint checking with differentiable violation scores.
"""

from __future__ import annotations
import functools
import math
from dataclasses import dataclass
from typing import Callable

class EthicalViolation(Exception):
    pass

def v_net(violation: float, lam: float = 1e6) -> float:
    return math.exp(-lam * max(0.0, violation))

def ethical_constraint(**constraints: Callable) -> Callable:
    def decorator(fn: Callable) -> Callable:
        @functools.wraps(fn)
        def wrapper(*args, **kwargs):
            violations = []
            for name, check in constraints.items():
                result = check(*args, **kwargs)
                if not result:
                    violations.append(name)
            if violations:
                raise EthicalViolation(f"Constraints violated: {violations}")
            return fn(*args, **kwargs)
        return wrapper
    return decorator

@dataclass
class Constraint:
    name: str
    fn: Callable
    weight: float = 1.0

class EthicalGuard:
    def __init__(self, lam: float = 1e6, threshold: float = 0.5):
        self.lam = lam
        self.threshold = threshold
        self._constraints = []

    def add(self, constraint: Constraint):
        self._constraints.append(constraint)
        return self

    def evaluate(self, action: dict, state: dict) -> dict:
        total_violation = 0.0
        for c in self._constraints:
            compliance = c.fn(action, state)
            violation = max(0.0, 1.0 - compliance)
            total_violation += violation * c.weight
        overall = v_net(total_violation, self.lam)
        return {'feasible': overall >= self.threshold, 'overall_v_net': overall}

    def enforce(self, action: dict, state: dict):
        result = self.evaluate(action, state)
        if not result['feasible']:
            raise EthicalViolation(f"Action blocked. V_net={result['overall_v_net']:.4f}")
        return result

class FairnessConstraints:
    @staticmethod
    def demographic_parity(group_a_rate: str, group_b_rate: str, max_gap: float = 0.1):
        def fn(action, state):
            gap = abs(action.get(group_a_rate, 0.5) - action.get(group_b_rate, 0.5))
            return max(0.0, 1.0 - gap / max_gap)
        return fn

    @staticmethod
    def non_maleficence(harm_key: str):
        def fn(action, state):
            return 1.0 if action.get(harm_key, 0) == 0 else 0.0
        return fn

if __name__ == "__main__":
    guard = EthicalGuard()
    guard.add(Constraint('fairness', FairnessConstraints.demographic_parity('rate_a', 'rate_b')))
    result = guard.evaluate({'rate_a': 0.55, 'rate_b': 0.45}, {})
    print(f"Ethical evaluation: {result}")

Fractional Calculus & Physics Implementations
===============================================
Riemann-Liouville fractional derivatives and standard ΛCDM cosmology.
"""

import numpy as np
from scipy.integrate import quad
from scipy.special import gamma
import math

class FractionalCalculus:
    @staticmethod
    def derivative(f, alpha: float, a: float, t: float, eps: float = 1e-8) -> float:
        if alpha == 0.0:
            return f(t)
        if alpha == 1.0:
            h = 1e-5
            return (f(t + h) - f(t - h)) / (2 * h)
        
        def integrand(tau):
            return f(tau) / (t - tau + eps) ** alpha
        
        integral, _ = quad(integrand, a, t - eps, limit=200)
        h = 1e-5
        def integral_at(s):
            v, _ = quad(lambda tau: f(tau) / (s - tau + eps) ** alpha, a, s - eps, limit=200)
            return v
        deriv = (integral_at(t + h) - integral) / h
        return deriv / gamma(1 - alpha)

class Cosmology:
    def __init__(self, H0: float = 67.66, omega_m: float = 0.311, omega_lambda: float = 0.6889):
        self.H0 = H0
        self.omega_m = omega_m
        self.omega_lambda = omega_lambda
    
    def age_gyr(self) -> float:
        def integrand(a):
            return 1.0 / (a * np.sqrt(self.omega_m * a**-3 + self.omega_lambda))
        integral, _ = quad(integrand, 1e-10, 1.0, limit=500)
        H0_si = self.H0 * 1e3 / 3.0857e22
        age_s = integral / H0_si
        return age_s / (365.25 * 24 * 3600 * 1e9)

class RelativisticDynamics:
    c = 299792458.0
    def __init__(self, velocity: float):
        if abs(velocity) >= self.c:
            raise ValueError("Speed must be less than c")
        self.v = velocity
    
    def lorentz_factor(self) -> float:
        return 1.0 / np.sqrt(1.0 - (self.v / self.c)**2)
    
    def time_dilation(self, t_lab: float) -> float:
        return t_lab / self.lorentz_factor()

if __name__ == "__main__":
    cosmos = Cosmology()
    print(f"Universe age: {cosmos.age_gyr():.3f} Gyr")
    for beta in [0.5, 0.9]:
        v = beta * RelativisticDynamics.c
        r = RelativisticDynamics(v)
        print(f"v={beta}c, γ={r.lorentz_factor():.3f}")

Consciousness-Adjacent: Φ Computation & 3D Field Simulation
=============================================================
Integrated Information Theory proxy and coupled field dynamics.
"""

import numpy as np

class PhiComputation:
    @staticmethod
    def gradient_squared(field: np.ndarray, dt: float = 1.0) -> float:
        grads = np.gradient(field)
        grad_mag_sq = sum(g**2 for g in grads)
        return float(np.sum(grad_mag_sq) * dt)
    
    @staticmethod
    def mutual_information_proxy(field_a: np.ndarray, field_b: np.ndarray) -> float:
        a = field_a.ravel()
        b = field_b.ravel()
        if np.std(a) < 1e-10 or np.std(b) < 1e-10:
            return 0.0
        corr = np.corrcoef(a, b)[0, 1]
        return float(abs(corr))

class ThreeFieldSimulation:
    def __init__(self, size: int = 32, seed: int = 42):
        self.size = size
        rng = np.random.default_rng(seed)
        self.R = rng.standard_normal((size, size, size))
        self.G = rng.standard_normal((size, size, size))
        self.B = rng.standard_normal((size, size, size))
    
    def run(self, steps: int = 20, coupling: float = 0.05):
        for t in range(steps):
            # Simple diffusion and coupling
            for field in [self.R, self.G, self.B]:
                shifted = (np.roll(field, 1, 0) + np.roll(field, -1, 0) +
                          np.roll(field, 1, 1) + np.roll(field, -1, 1) +
                          np.roll(field, 1, 2) + np.roll(field, -1, 2)) / 6.0
                field[:] = shifted * 0.9 + field * 0.1
            
            avg = (self.R + self.G + self.B) / 3.0
            self.R += coupling * (avg - self.R)
            self.G += coupling * (avg - self.G)
            self.B += coupling * (avg - self.B)
        
        phi = PhiComputation.gradient_squared(self.R + self.G + self.B)
        mi = PhiComputation.mutual_information_proxy(self.R, self.G)
        return {'phi_total': phi, 'mi_rg': mi}

if __name__ == "__main__":
    sim = ThreeFieldSimulation(size=16)
    results = sim.run(steps=15, coupling=0.08)
    print(f"Φ_total: {results['phi_total']:.3f}, MI(R,G): {results['mi_rg']:.3f}")

Study Assistant with Spaced Repetition
========================================
Practical CLI study tool with Pomodoro timer and flashcards.
"""

import time
import sqlite3
from datetime import datetime

class StudyAssistant:
    def __init__(self, db_path: str = 'study_data.db'):
        self.conn = sqlite3.connect(db_path)
        self._create_tables()
    
    def _create_tables(self):
        c = self.conn.cursor()
        c.execute('''CREATE TABLE IF NOT EXISTS sessions
                     (id INTEGER PRIMARY KEY, topic TEXT, start_time TEXT,
                      duration_min INTEGER, notes TEXT)''')
        c.execute('''CREATE TABLE IF NOT EXISTS flashcards
                     (id INTEGER PRIMARY KEY, question TEXT, answer TEXT,
                      topic TEXT, last_reviewed TEXT, difficulty INTEGER)''')
        self.conn.commit()
    
    def pomodoro(self, work_min: int = 25, break_min: int = 5):
        print(f"Pomodoro: {work_min} min work / {break_min} min break")
        for session in range(2):
            print(f"WORK session {session+1} - {datetime.now().strftime('%H:%M')}")
            time.sleep(work_min * 60)
            print("Break time!")
            time.sleep(break_min * 60)
        print("Pomodoro complete!")
    
    def add_flashcard(self):
        q = input("Question: ").strip()
        a = input("Answer: ").strip()
        t = input("Topic: ").strip() or "General"
        c = self.conn.cursor()
        c.execute('INSERT INTO flashcards (question, answer, topic, last_reviewed, difficulty) VALUES (?,?,?,?,?)',
                  (q, a, t, datetime.now().isoformat(), 3))
        self.conn.commit()
        print("Flashcard saved.")
    
    def quiz(self, topic: str = None):
        c = self.conn.cursor()
        if topic:
            c.execute('SELECT question, answer FROM flashcards WHERE topic=?', (topic,))
        else:
            c.execute('SELECT question, answer FROM flashcards')
        cards = c.fetchall()
        if not cards:
            print("No flashcards found.")
            return
        correct = 0
        for q, a in cards:
            print(f"Q: {q}")
            input("Press Enter for answer...")
            print(f"A: {a}")
            rating = input("Correct? (y/n): ").strip().lower()
            if rating == 'y':
                correct += 1
        print(f"Score: {correct}/{len(cards)} ({correct/len(cards)*100:.0f}%)")
    
    def stats(self):
        c = self.conn.cursor()
        c.execute('SELECT COUNT(*) FROM flashcards')
        print(f"Total flashcards: {c.fetchone()[0]}")
        c.execute('SELECT SUM(duration_min) FROM sessions')
        total = c.fetchone()[0] or 0
        print(f"Total study time: {total} min")

if __name__ == "__main__":
    assistant = StudyAssistant()
    print("Study Assistant ready. Methods: pomodoro(), add_flashcard(), quiz(), stats()")

          <div class="file-desc">${file.desc}</div>
        </div>
        <button class="download-btn" data-filename="${file.name}">⬇️ Download</button>
      `;
      container.appendChild(item);
    });

    document.querySelectorAll('.download-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const filename = btn.getAttribute('data-filename');
        downloadFile(filename);
      });
    });
  }

  render();
  document.getElementById('downloadAllBtn').addEventListener('click', downloadAll);
</script>
</body>
</html>
